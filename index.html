<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HWHS 自動發卡商城</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Noto Sans TC', sans-serif; background: #f1f5f9; margin: 0; color: #1e293b; }

        .page { display: none; padding: 20px 12px 120px 12px; min-height: 100vh; }
        .page.active { display: block; }

        /* 商品卡片縮小排版 */
        .prod-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
        
        .nav-bar {
            position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; height: 65px;
            background: #0f172a; border-radius: 20px;
            display: flex; align-items: center; justify-content: space-around; z-index: 1000;
        }
        .nav-btn { flex: 1; text-align: center; color: #64748b; font-size: 12px; font-weight: 700; }
        .nav-btn.active { color: #fff; }

        /* 模擬支付畫面 */
        .pay-screen {
            position: fixed; inset: 0; background: white; z-index: 3000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        .pay-screen.active { display: flex; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .payment-option {
            border: 2px solid #f1f5f9; border-radius: 15px; padding: 15px;
            display: flex; align-items: center; gap: 10px; transition: 0.2s;
        }
        .payment-option.selected { border-color: #3b82f6; background: #eff6ff; }
        
        #toast {
            position: fixed; top: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: #fff; padding: 10px 20px;
            border-radius: 50px; font-size: 12px; z-index: 4000; opacity: 0; transition: 0.3s;
        }
        #toast.show { opacity: 1; }
    </style>
</head>
<body>

    <div id="toast">訊息</div>

    <section id="page-home" class="page active">
        <div class="flex justify-between items-end mb-6">
            <h1 class="text-2xl font-black tracking-tighter">CARD SHOP</h1>
            <p class="text-[10px] font-bold text-slate-400">餘額: 90,000,000.00</p>
        </div>
        <div id="category-container" class="flex gap-2 overflow-x-auto pb-4 no-scrollbar mb-2"></div>
        <div id="product-list" class="prod-grid"></div>
    </section>

    <section id="page-admin" class="page">
        <h1 class="text-2xl font-black mb-6">管理後台</h1>
        <div class="bg-white p-4 rounded-2xl mb-4 shadow-sm border">
            <h3 class="text-xs font-black text-slate-400 mb-3">總銷售統計</h3>
            <div id="stat-revenue" class="text-2xl font-black">$0</div>
        </div>
        <div id="admin-product-list" class="space-y-2"></div>
    </section>

    <section id="page-cards" class="page">
        <h1 class="text-2xl font-black mb-6">我的卡密</h1>
        <div id="my-card-list" class="space-y-3"></div>
    </section>

    <nav class="nav-bar">
        <div onclick="go('home')" id="n-home" class="nav-btn active">商城</div>
        <div onclick="go('cards')" id="n-cards" class="nav-btn">我的卡密</div>
        <div onclick="go('admin')" id="n-admin" class="nav-btn">管理</div>
    </nav>

    <div id="buy-modal" class="fixed inset-0 bg-black/60 hidden z-[2000] flex items-center justify-center p-6 backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm rounded-[30px] p-6 shadow-2xl">
            <h2 id="m-buy-title" class="text-xl font-black mb-1"></h2>
            <p id="m-buy-price" class="text-blue-600 font-black mb-6"></p>
            
            <div class="space-y-3 mb-6">
                <p class="text-[10px] font-bold text-slate-400 ml-1">選擇支付方式</p>
                <div onclick="selectPay('wechat')" id="pay-wechat" class="payment-option selected">
                    <img src="https://img.icons8.com/color/48/weixindetachable.png" class="w-8">
                    <span class="font-bold">微信支付</span>
                </div>
                <div onclick="selectPay('alipay')" id="pay-alipay" class="payment-option">
                    <img src="https://img.icons8.com/color/48/alipay.png" class="w-8">
                    <span class="font-bold">支付寶</span>
                </div>
            </div>

            <button onclick="startPay()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black shadow-lg">確認付款</button>
            <button onclick="closeModals()" class="w-full text-slate-300 font-bold py-2 mt-2 text-sm">取消</button>
        </div>
    </div>

    <div id="pay-screen" class="pay-screen">
        <div id="pay-loading" class="text-center">
            <div class="w-16 h-16 border-4 border-slate-200 border-t-blue-500 rounded-full animate-spin mx-auto mb-4"></div>
            <p id="pay-text" class="font-black text-slate-800">正在安全支付中...</p>
        </div>
        <div id="pay-success" class="hidden text-center scale-110">
            <div class="w-20 h-20 bg-green-500 rounded-full flex items-center justify-center mx-auto mb-4 text-white text-4xl">✓</div>
            <h2 class="text-2xl font-black mb-2">支付成功</h2>
            <p class="text-slate-400 font-bold mb-6">已成功扣款 <span id="paid-amount"></span> 元</p>
            <div class="bg-slate-50 p-4 rounded-2xl border-2 border-dashed border-slate-200 mb-6">
                <p class="text-[10px] font-bold text-slate-400 mb-1 uppercase">您的卡密：</p>
                <p id="new-card-code" class="font-black text-blue-600 text-lg tracking-widest"></p>
            </div>
            <button onclick="copyNewCode()" class="bg-blue-600 text-white px-8 py-3 rounded-xl font-black mb-4">點擊複製卡密</button>
            <br>
            <button onclick="closePay()" class="text-slate-400 font-bold text-sm">回到商店</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://qliyeeermhtzxismtfdc.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_8LJkxWG-tcL0PBPtDyreVw_HyqKSDNk';
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let products = [], categories = [], orders = [], myCards = [];
        let currentP = null, selectedMethod = 'wechat';

        function toast(msg) {
            const t = document.getElementById('toast'); t.innerText = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        async function refresh() {
            const { data: p } = await client.from('products').select('*');
            products = p || [];
            renderStore();
            renderAdmin();
        }

        function renderStore() {
            document.getElementById('product-list').innerHTML = products.map(p => `
                <div class="bg-white p-3 rounded-2xl border border-white shadow-sm flex flex-col">
                    <div class="aspect-square bg-slate-50 rounded-xl overflow-hidden mb-2">
                        <img src="${p.image_url}" class="w-full h-full object-contain">
                    </div>
                    <p class="font-bold text-xs truncate mb-1">${p.name}</p>
                    <p class="font-black text-blue-600 text-sm mb-3">$${p.price}</p>
                    <button onclick="openBuyModal('${p.id}')" class="w-full bg-slate-100 text-slate-800 py-2 rounded-lg font-black text-[10px] active:scale-95 transition-all">
                        立即購買
                    </button>
                </div>
            `).join('');
        }

        function openBuyModal(id) {
            currentP = products.find(x => x.id === id);
            document.getElementById('m-buy-title').innerText = currentP.name;
            document.getElementById('m-buy-price').innerText = `$ ${currentP.price} TWD`;
            document.getElementById('buy-modal').classList.remove('hidden');
        }

        function selectPay(method) {
            selectedMethod = method;
            document.querySelectorAll('.payment-option').forEach(el => el.classList.remove('selected'));
            document.getElementById('pay-' + method).classList.add('selected');
        }

        function startPay() {
            document.getElementById('buy-modal').classList.add('hidden');
            const screen = document.getElementById('pay-screen');
            screen.classList.add('active');
            document.getElementById('pay-loading').classList.remove('hidden');
            document.getElementById('pay-success').classList.add('hidden');
            document.getElementById('pay-text').innerText = selectedMethod === 'wechat' ? '正在調用微信支付...' : '正在跳轉支付寶安全支付...';

            setTimeout(() => {
                document.getElementById('pay-loading').classList.add('hidden');
                document.getElementById('pay-success').classList.remove('hidden');
                const code = Array.from({length:18}, () => Math.floor(Math.random()*10)).join('');
                document.getElementById('new-card-code').innerText = code;
                document.getElementById('paid-amount').innerText = currentP.price;
                
                // 存入我的卡片
                myCards.unshift({ name: currentP.name, code: code, date: new Date().toLocaleString() });
                renderMyCards();
            }, 2500);
        }

        function copyNewCode() {
            const code = document.getElementById('new-card-code').innerText;
            navigator.clipboard.writeText(code);
            toast('✅ 卡密已複製');
        }

        function renderMyCards() {
            document.getElementById('my-card-list').innerHTML = myCards.map(c => `
                <div class="bg-white p-4 rounded-2xl border shadow-sm">
                    <p class="font-black text-sm mb-1">${c.name}</p>
                    <div class="flex justify-between items-center bg-slate-50 p-3 rounded-xl">
                        <span class="text-blue-600 font-mono font-bold tracking-widest">${c.code}</span>
                        <button onclick="copyCode('${c.code}')" class="text-[10px] bg-slate-900 text-white px-3 py-1 rounded-lg">複製</button>
                    </div>
                    <p class="text-[9px] text-slate-300 mt-2">購買時間: ${c.date}</p>
                </div>
            `).join('');
        }

        function copyCode(code) {
            navigator.clipboard.writeText(code);
            toast('✅ 已複製');
        }

        function closePay() { document.getElementById('pay-screen').classList.remove('active'); }
        function closeModals() { document.getElementById('buy-modal').classList.add('hidden'); }

        function go(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('page-'+id).classList.add('active');
            document.getElementById('n-'+id).classList.add('active');
        }

        function renderAdmin() {
            document.getElementById('admin-product-list').innerHTML = products.map(p => `
                <div class="bg-white p-3 rounded-xl border flex items-center gap-3">
                    <img src="${p.image_url}" class="w-10 h-10 object-contain rounded bg-slate-50">
                    <div class="flex-1">
                        <p class="font-black text-xs">${p.name}</p>
                        <p class="text-[10px] font-bold text-blue-500">$${p.price}</p>
                    </div>
                </div>
            `).join('');
        }

        refresh();
    </script>
</body>
</html>
