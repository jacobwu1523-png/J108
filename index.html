<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>校園預購系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background: #f8fafc; margin: 0; }

        /* 解決閃爍與佈局穩定 */
        .page-container { display: grid; grid-template-areas: "stack"; width: 100%; min-height: 100vh; }
        .page { 
            grid-area: stack; opacity: 0; visibility: hidden; 
            transition: opacity 0.2s ease; padding-bottom: 120px; 
        }
        .page.active { opacity: 1; visibility: visible; z-index: 10; }

        /* 圖片容器：強制正方形且不裁切 */
        .img-square {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: #ffffff; /* 圖片周圍補白 */
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-bottom: 1px solid #f1f5f9;
        }
        .img-square img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; /* 關鍵：完整顯示不裁切 */
        }

        .bottom-nav { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
            width: 92%; max-width: 400px; background: rgba(15, 23, 42, 0.95); 
            backdrop-filter: blur(10px); border-radius: 30px; 
            display: flex; padding: 6px; z-index: 100; box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .nav-item { flex: 1; text-align: center; padding: 12px; border-radius: 25px; color: #94a3b8; font-weight: bold; cursor: pointer; }
        .nav-item.active { background: #fff; color: #0f172a; }

        #toast { 
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%); 
            z-index: 1000; background: #0f172a; color: #fff; padding: 12px 24px; 
            border-radius: 16px; font-weight: bold; opacity: 0; transition: 0.3s; pointer-events: none; 
        }
        #toast.show { opacity: 1; }
    </style>
</head>
<body>

    <div id="toast">訊息通知</div>

    <main class="page-container">
        <section id="page-home" class="page active p-5">
            <h1 class="text-3xl font-black mb-6 text-slate-800">SCHOOL SHOP.</h1>
            <div id="product-list" class="grid grid-cols-2 gap-4"></div>
        </section>

        <section id="page-admin" class="page p-5">
            <h1 class="text-3xl font-black mb-6">ADMIN.</h1>
            <div class="bg-white p-6 rounded-3xl border shadow-sm mb-6">
                <p class="text-slate-400 text-xs font-bold uppercase">總營收額</p>
                <h2 id="total-revenue" class="text-4xl font-black text-blue-600">$0</h2>
            </div>
            <div id="admin-orders" class="space-y-3"></div>
        </section>

        <section id="page-delivery" class="page p-5">
            <h1 class="text-3xl font-black mb-6">LOGISTICS.</h1>
            <div id="delivery-list" class="space-y-3"></div>
        </section>
    </main>

    <nav class="bottom-nav">
        <div onclick="go('home')" id="n-home" class="nav-item active text-sm">商店</div>
        <div onclick="go('admin')" id="n-admin" class="nav-item text-sm">訂單</div>
        <div onclick="go('delivery')" id="n-delivery" class="nav-item text-sm">配送</div>
    </nav>

    <div id="modal" class="fixed inset-0 bg-slate-900/60 hidden backdrop-blur-md z-[200] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-[35px] p-7 shadow-2xl">
            <h2 id="m-title" class="text-2xl font-black mb-4"></h2>
            <div class="space-y-4">
                <input id="f-name" type="text" placeholder="訂購人姓名" class="w-full p-4 bg-slate-50 rounded-2xl outline-none border border-slate-100">
                
                <div class="flex gap-2">
                    <select id="f-class" class="flex-1 p-4 bg-slate-50 rounded-2xl outline-none border border-slate-100 text-sm"></select>
                    <select id="f-seat" class="w-24 p-4 bg-slate-50 rounded-2xl outline-none border border-slate-100 text-sm"></select>
                </div>

                <div class="bg-blue-50 p-4 rounded-2xl border border-blue-100 flex justify-between items-center">
                    <div>
                        <p class="text-[10px] font-bold text-blue-400 uppercase">數量</p>
                        <input id="f-qty" type="number" value="1" min="1" oninput="calcTotal()" class="w-16 bg-transparent font-black text-xl outline-none">
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] font-bold text-blue-400 uppercase">應付小計</p>
                        <p id="f-total" class="font-black text-2xl text-blue-600">$0</p>
                    </div>
                </div>

                <button id="btn-sub" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black text-lg shadow-lg shadow-blue-100 active:scale-95 transition-transform">確認預訂</button>
                <button onclick="closeM()" class="w-full text-slate-400 font-bold py-2 text-sm">取消返回</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://qliyeeermhtzxismtfdc.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_8LJkxWG-tcL0PBPtDyreVw_HyqKSDNk';
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let products = [];
        let currentP = null;

        // 自動生成班級 J101-J110, J201-J220, J301-J330 + 高中部 H
        function initClassOptions() {
            const clsSelect = document.getElementById('f-class');
            const types = ['J', 'H'];
            const ranges = { 1: 10, 2: 20, 3: 30 };
            
            types.forEach(t => {
                for (let grade = 1; grade <= 3; grade++) {
                    for (let room = 1; room <= ranges[grade]; room++) {
                        let roomStr = room.toString().padStart(2, '0');
                        let val = `${t}${grade}${roomStr}`;
                        clsSelect.add(new Option(val, val));
                    }
                }
            });

            const seatSelect = document.getElementById('f-seat');
            for(let i=1; i<=50; i++) seatSelect.add(new Option(i+'號', i));
        }

        function toast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        function go(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('page-'+id).classList.add('active');
            document.getElementById('n-'+id).classList.add('active');
            refresh();
        }

        async function refresh() {
            const { data: p } = await client.from('products').select('*');
            if(p) { products = p; renderP(); }
            const { data: o } = await client.from('orders').select('*').order('created_at', {ascending: false});
            if(o) { renderA(o); renderD(o); }
        }

        function renderP() {
            document.getElementById('product-list').innerHTML = products.map(p => `
                <div class="bg-white rounded-[28px] overflow-hidden border border-slate-100 shadow-sm">
                    <div class="img-square">
                        <img src="${p.image_url || 'https://via.placeholder.com/300'}">
                    </div>
                    <div class="p-4 text-center">
                        <h3 class="font-bold text-slate-700 truncate text-sm">${p.name}</h3>
                        <p class="font-black text-blue-600 mt-1">$${p.price}</p>
                        <button onclick="openM('${p.id}')" class="w-full mt-3 py-2 bg-slate-900 text-white rounded-xl text-[10px] font-black uppercase tracking-wider">立即預訂</button>
                    </div>
                </div>
            `).join('');
        }

        window.openM = (id) => {
            currentP = products.find(p => p.id === id);
            document.getElementById('m-title').innerText = currentP.name;
            document.getElementById('f-qty').value = 1;
            calcTotal();
            document.getElementById('modal').classList.remove('hidden');
        };

        window.calcTotal = () => {
            const qty = document.getElementById('f-qty').value;
            document.getElementById('f-total').innerText = '$' + (qty * currentP.price);
        };

        document.getElementById('btn-sub').onclick = async () => {
            const name = document.getElementById('f-name').value;
            const qty = parseInt(document.getElementById('f-qty').value);
            if(!name) return toast('⚠️ 請輸入姓名');

            const { error } = await client.from('orders').insert([{
                customer_name: name,
                class_name: document.getElementById('f-class').value,
                seat_number: document.getElementById('f-seat').value,
                product_name: currentP.name,
                quantity: qty,
                total_price: qty * currentP.price,
                payment_status: '未付款',
                delivery_status: '未配送'
            }]);

            if(!error) { toast('🚀 預訂成功！'); closeM(); refresh(); }
        };

        function renderA(o) {
            document.getElementById('total-revenue').innerText = '$' + o.reduce((s, x) => s + x.total_price, 0);
            document.getElementById('admin-orders').innerHTML = o.map(x => `
                <div class="bg-white p-4 rounded-2xl border flex justify-between items-center">
                    <div>
                        <p class="font-bold text-slate-800 text-sm">${x.customer_name} (${x.product_name} x${x.quantity})</p>
                        <div class="flex gap-2 mt-1">
                            <span class="text-[10px] font-bold px-2 py-0.5 rounded-full ${x.payment_status==='已付款'?'bg-green-100 text-green-600':'bg-red-100 text-red-600'}">${x.payment_status}</span>
                        </div>
                    </div>
                    <p class="font-black">$${x.total_price}</p>
                </div>
            `).join('');
        }

        function renderD(o) {
            document.getElementById('delivery-list').innerHTML = o.map(x => `
                <div class="bg-white p-5 rounded-3xl border shadow-sm flex flex-col gap-3">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-xl font-black text-slate-900">${x.class_name} 班 ${x.seat_number} 號</p>
                            <p class="text-xs font-bold text-slate-400">${x.customer_name} · ${x.product_name} x${x.quantity}</p>
                        </div>
                        <div class="text-right">
                            <p class="font-black text-blue-600">$${x.total_price}</p>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <select onchange="upd('${x.id}','payment_status',this.value)" class="text-xs font-bold p-2 rounded-xl bg-slate-50 border-0">
                            <option ${x.payment_status==='未付款'?'selected':''}>未付款</option>
                            <option ${x.payment_status==='已付款'?'selected':''}>已付款</option>
                        </select>
                        <select onchange="upd('${x.id}','delivery_status',this.value)" class="text-xs font-bold p-2 rounded-xl bg-slate-50 border-0">
                            <option ${x.delivery_status==='未配送'?'selected':''}>未配送</option>
                            <option ${x.delivery_status==='已完成'?'selected':''}>已完成</option>
                        </select>
                    </div>
                </div>
            `).join('');
        }

        window.upd = async (id, field, val) => {
            await client.from('orders').update({ [field]: val }).eq('id', id);
            toast('✅ 狀態更新成功');
            refresh();
        };

        window.closeM = () => document.getElementById('modal').classList.add('hidden');
        
        initClassOptions();
        refresh();
        
        // 即時更新監聽
        client.channel('any').on('postgres_changes', { event: '*', schema: 'public' }, () => refresh()).subscribe();
    </script>
</body>
</html>
