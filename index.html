<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>校園預購系統-專業管理版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Noto Sans TC', sans-serif; background: #f1f5f9; margin: 0; color: #1e293b; overflow-x: hidden; }

        .page { display: none; padding: 20px 16px 120px 16px; min-height: 100vh; }
        .page.active { display: block; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .nav-bar {
            position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
            width: 95%; max-width: 500px; height: 64px;
            background: #0f172a; border-radius: 20px;
            display: flex; align-items: center; justify-content: space-around;
            padding: 4px; z-index: 999; box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .nav-btn { flex: 1; height: 100%; display: flex; align-items: center; justify-content: center; color: #64748b; font-size: 13px; font-weight: 700; cursor: pointer; }
        .nav-btn.active { color: #0f172a; background: #fff; border-radius: 16px; }

        /* 篩選按鈕樣式 */
        .filter-btn { padding: 6px 14px; border-radius: 10px; font-size: 12px; font-weight: bold; background: #fff; color: #64748b; border: 1px solid #e2e8f0; transition: 0.2s; }
        .filter-btn.active { background: #0f172a; color: #fff; border-color: #0f172a; }

        #toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: #0f172a; color: #fff; padding: 12px 24px;
            border-radius: 50px; font-weight: bold; z-index: 2000; opacity: 0; transition: 0.3s; pointer-events: none;
        }
        #toast.show { opacity: 1; top: 40px; }
    </style>
</head>
<body>

    <div id="toast">訊息通知</div>

    <section id="page-home" class="page active">
        <h1 class="text-3xl font-black mb-6">SHOP.</h1>
        <div id="product-list" class="grid grid-cols-2 gap-3 sm:grid-cols-3"></div>
    </section>

    <section id="page-admin" class="page">
        <h1 class="text-3xl font-black mb-4">ADMIN.</h1>
        
        <div class="bg-indigo-600 p-6 rounded-3xl text-white shadow-lg mb-6">
            <p class="text-[10px] font-bold opacity-70 uppercase">總預算營收</p>
            <h2 id="total-revenue" class="text-4xl font-black">$0</h2>
        </div>

        <div class="flex justify-between items-center mb-4">
            <h2 class="text-lg font-black">商品庫存管理</h2>
            <button onclick="openEditModal()" class="bg-black text-white px-3 py-1.5 rounded-lg text-xs font-bold">+ 新增</button>
        </div>
        <div id="admin-product-list" class="space-y-2 mb-8"></div>

        <hr class="mb-8 border-slate-200">

        <h2 class="text-lg font-black mb-3">訂單篩選系統</h2>
        <div class="flex gap-2 overflow-x-auto pb-4 no-scrollbar">
            <button onclick="setFilter('all')" class="filter-btn active" id="f-all">全部</button>
            <button onclick="setFilter('未付款')" class="filter-btn" id="f-unpaid">未付款</button>
            <button onclick="setFilter('未配送')" class="filter-btn" id="f-pending">未配送</button>
            <button onclick="setFilter('已完成')" class="filter-btn" id="f-done">已完成</button>
        </div>
        <div id="admin-order-list" class="space-y-3"></div>
    </section>

    <section id="page-delivery" class="page">
        <h1 class="text-3xl font-black mb-6">LOGISTICS.</h1>
        <div id="delivery-list" class="space-y-4"></div>
    </section>

    <nav class="nav-bar">
        <div onclick="go('home')" id="n-home" class="nav-btn active">商店</div>
        <div onclick="go('admin')" id="n-admin" class="nav-btn">管理</div>
        <div onclick="go('delivery')" id="n-delivery" class="nav-btn">配送</div>
    </nav>

    <div id="edit-modal" class="fixed inset-0 bg-black/60 hidden backdrop-blur-sm z-[1000] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-[30px] p-6 shadow-2xl">
            <h2 class="text-xl font-black mb-4">編輯商品</h2>
            <div class="space-y-3">
                <input id="e-id" type="hidden">
                <input id="e-name" type="text" placeholder="品名" class="w-full p-3 bg-slate-50 rounded-xl border-0">
                <div class="flex gap-2">
                    <input id="e-price" type="number" placeholder="價格" class="flex-1 p-3 bg-slate-50 rounded-xl border-0">
                    <input id="e-stock" type="number" placeholder="庫存" class="flex-1 p-3 bg-slate-50 rounded-xl border-0">
                </div>
                <input id="e-img" type="text" placeholder="圖片URL" class="w-full p-3 bg-slate-50 rounded-xl border-0 text-xs">
                <button onclick="saveProduct()" class="w-full bg-black text-white py-4 rounded-2xl font-black mt-2">儲存</button>
                <button id="btn-del-product" onclick="deleteProduct()" class="w-full bg-red-50 text-red-500 py-3 rounded-2xl font-bold text-sm hidden">刪除此商品</button>
                <button onclick="closeModals()" class="w-full text-slate-400 font-bold py-2 text-sm">取消</button>
            </div>
        </div>
    </div>

    <div id="buy-modal" class="fixed inset-0 bg-black/60 hidden backdrop-blur-sm z-[1000] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-[30px] p-6 shadow-2xl">
            <h2 id="m-buy-title" class="text-xl font-black mb-4"></h2>
            <div class="space-y-4">
                <input id="f-name" type="text" placeholder="姓名" class="w-full p-4 bg-slate-100 rounded-2xl border-0">
                <div class="flex gap-2"><select id="f-class" class="flex-1 p-4 bg-slate-100 rounded-2xl border-0 font-bold"></select><select id="f-seat" class="w-24 p-4 bg-slate-100 rounded-2xl border-0 font-bold"></select></div>
                <div class="bg-blue-50 p-4 rounded-2xl flex justify-between items-center"><input id="f-qty" type="number" value="1" min="1" oninput="recalcTotal()" class="w-16 bg-transparent font-black text-xl"><p id="f-total-price" class="font-black text-2xl text-blue-600">$0</p></div>
                <button id="btn-submit-order" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black">確認預訂</button>
                <button onclick="closeModals()" class="w-full text-slate-300 font-bold py-2">取消</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://qliyeeermhtzxismtfdc.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_8LJkxWG-tcL0PBPtDyreVw_HyqKSDNk';
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let products = [];
        let orders = [];
        let currentFilter = 'all';

        function toast(msg) {
            const t = document.getElementById('toast'); t.innerText = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        function go(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('page-'+id).classList.add('active');
            document.getElementById('n-'+id).classList.add('active');
            refresh();
        }

        async function refresh() {
            const { data: p } = await client.from('products').select('*').order('name');
            if(p) { products = p; renderStore(); renderAdminP(); }
            const { data: o } = await client.from('orders').select('*').order('created_at', {ascending: false});
            if(o) { orders = o; renderAdminOrders(); renderDelivery(); }
        }

        // 商店顯示邏輯
        function renderStore() {
            document.getElementById('product-list').innerHTML = products.map(p => `
                <div class="bg-white p-2 rounded-[24px] border border-slate-200 shadow-sm overflow-hidden">
                    <div class="relative w-full aspect-square bg-slate-50 flex items-center justify-center rounded-xl overflow-hidden">
                        <img src="${p.image_url}" class="max-w-full max-h-full object-contain">
                        ${p.stock <= 0 ? '<div class="absolute inset-0 bg-black/40 flex items-center justify-center text-white font-black">完售</div>' : ''}
                    </div>
                    <div class="p-2 text-center">
                        <p class="font-bold text-sm truncate">${p.name}</p>
                        <p class="font-black text-blue-600">$${p.price}</p>
                        <button onclick="openBuyModal('${p.id}')" ${p.stock <= 0 ? 'disabled' : ''} class="w-full mt-2 py-2 rounded-xl text-[10px] font-black ${p.stock <= 0 ? 'bg-slate-100 text-slate-300':'bg-slate-900 text-white'}">預訂</button>
                    </div>
                </div>
            `).join('');
        }

        // 商品管理
        function renderAdminP() {
            document.getElementById('admin-product-list').innerHTML = products.map(p => `
                <div class="bg-white p-3 rounded-2xl border flex items-center gap-3 shadow-sm">
                    <img src="${p.image_url}" class="w-10 h-10 rounded-lg object-contain bg-slate-50 border">
                    <div class="flex-1 font-bold text-sm">${p.name} <span class="text-blue-600 text-xs">$${p.price} / 剩${p.stock}</span></div>
                    <button onclick="openEditModal('${p.id}')" class="text-xs font-black text-slate-300">EDIT</button>
                </div>
            `).join('');
        }

        // 訂單管理與篩選
        window.setFilter = (f) => {
            currentFilter = f;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            if(f==='all') document.getElementById('f-all').classList.add('active');
            if(f==='未付款') document.getElementById('f-unpaid').classList.add('active');
            if(f==='未配送') document.getElementById('f-pending').classList.add('active');
            if(f==='已完成') document.getElementById('f-done').classList.add('active');
            renderAdminOrders();
        };

        function renderAdminOrders() {
            document.getElementById('total-revenue').innerText = '$' + orders.reduce((s,x)=>s+x.total_price, 0);
            
            const filtered = orders.filter(x => {
                if(currentFilter === 'all') return true;
                if(currentFilter === '未付款') return x.payment_status === '未付款';
                if(currentFilter === '未配送') return x.delivery_status === '未配送';
                if(currentFilter === '已完成') return x.delivery_status === '已完成';
                return true;
            });

            document.getElementById('admin-order-list').innerHTML = filtered.map(x => {
                let timeStr = "";
                if(x.completed_at) {
                    const date = new Date(x.completed_at);
                    timeStr = `<p class="text-[9px] text-green-500 font-bold mt-1">完成時間: ${date.toLocaleString('zh-TW', {hour12:false})}</p>`;
                }
                return `
                <div class="bg-white p-4 rounded-2xl border shadow-sm relative">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="font-black text-sm">${x.customer_name} <span class="text-slate-400 font-normal">(${x.class_name})</span></p>
                            <p class="text-xs text-slate-500">${x.product_name} x${x.quantity}</p>
                            ${timeStr}
                        </div>
                        <div class="text-right">
                            <p class="font-black text-sm">$${x.total_price}</p>
                            <button onclick="deleteOrder('${x.id}')" class="text-[10px] font-bold text-red-400 mt-2">取消預訂</button>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        // 配送清單與自動隱藏
        function renderDelivery() {
            const now = new Date().getTime();
            const filtered = orders.filter(x => {
                if (x.delivery_status === '已完成' && x.completed_at) {
                    if (now - new Date(x.completed_at).getTime() > 120000) return false;
                }
                return true;
            });

            document.getElementById('delivery-list').innerHTML = filtered.map(x => `
                <div class="bg-white p-5 rounded-[28px] border shadow-sm ${x.delivery_status==='已完成'?'opacity-50':''}">
                    <div class="flex justify-between mb-4">
                        <div>
                            <p class="text-xl font-black">${x.class_name}-${x.seat_number}號</p>
                            <p class="text-xs font-bold text-slate-400">${x.customer_name} · ${x.product_name}</p>
                        </div>
                        <p class="font-black text-blue-600 text-lg">$${x.total_price}</p>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <select onchange="updStatus('${x.id}','payment_status',this.value)" class="p-3 bg-slate-50 rounded-xl text-xs font-bold border-0">
                            <option ${x.payment_status==='未付款'?'selected':''}>未付款</option>
                            <option ${x.payment_status==='已付款'?'selected':''}>已付款</option>
                        </select>
                        <select onchange="updStatus('${x.id}','delivery_status',this.value)" class="p-3 bg-slate-50 rounded-xl text-xs font-bold border-0">
                            <option ${x.delivery_status==='未配送'?'selected':''}>未配送</option>
                            <option ${x.delivery_status==='已完成'?'selected':''}>已完成</option>
                        </select>
                    </div>
                </div>
            `).join('');
        }

        window.updStatus = async (id, f, v) => {
            let data = { [f]: v };
            if (f === 'delivery_status' && v === '已完成') {
                data.completed_at = new Date().toISOString();
            } else if (f === 'delivery_status' && v === '未配送') {
                data.completed_at = null;
            }
            await client.from('orders').update(data).eq('id', id);
            toast('狀態已更新'); refresh();
        };

        // 基本維護功能
        window.openEditModal = (id) => {
            const btnDel = document.getElementById('btn-del-product');
            if(id) {
                const p = products.find(x => x.id === id);
                document.getElementById('e-id').value = p.id;
                document.getElementById('e-name').value = p.name;
                document.getElementById('e-price').value = p.price;
                document.getElementById('e-stock').value = p.stock;
                document.getElementById('e-img').value = p.image_url;
                btnDel.classList.remove('hidden');
            } else {
                document.getElementById('e-id').value = '';
                document.getElementById('e-name').value = '';
                btnDel.classList.add('hidden');
            }
            document.getElementById('edit-modal').classList.remove('hidden');
        };
        window.saveProduct = async () => {
            const data = { name: document.getElementById('e-name').value, price: parseInt(document.getElementById('e-price').value), stock: parseInt(document.getElementById('e-stock').value), image_url: document.getElementById('e-img').value };
            const id = document.getElementById('e-id').value;
            if(id) await client.from('products').update(data).eq('id', id);
            else await client.from('products').insert([data]);
            closeModals(); refresh();
        };
        window.deleteProduct = async () => { if(confirm('刪除商品？')) { await client.from('products').delete().eq('id', document.getElementById('e-id').value); closeModals(); refresh(); }};
        window.deleteOrder = async (id) => { if(confirm('取消預訂？')) { await client.from('orders').delete().eq('id', id); refresh(); }};
        window.closeModals = () => { document.getElementById('buy-modal').classList.add('hidden'); document.getElementById('edit-modal').classList.add('hidden'); };

        // 買家功能
        window.openBuyModal = (id) => {
            const p = products.find(x => x.id === id); currentP = p;
            document.getElementById('m-buy-title').innerText = p.name;
            document.getElementById('f-qty').value = 1; recalcTotal();
            document.getElementById('buy-modal').classList.remove('hidden');
        };
        window.recalcTotal = () => { document.getElementById('f-total-price').innerText = '$' + (document.getElementById('f-qty').value * currentP.price); };
        document.getElementById('btn-submit-order').onclick = async () => {
            const name = document.getElementById('f-name').value;
            const qty = parseInt(document.getElementById('f-qty').value);
            if(!name) return toast('請輸入姓名');
            await client.from('products').update({ stock: currentP.stock - qty }).eq('id', currentP.id);
            await client.from('orders').insert([{
                customer_name: name, class_name: document.getElementById('f-class').value,
                seat_number: document.getElementById('f-seat').value, product_name: currentP.name,
                quantity: qty, total_price: qty * currentP.price, payment_status: '未付款', delivery_status: '未配送'
            }]);
            toast('預訂成功'); closeModals(); refresh();
        };

        function initClasses() {
            const cls = document.getElementById('f-class');
            ['J','H'].forEach(t => { for(let g=1; g<=3; g++) { for(let r=1; r<=30; r++) { 
                let v = `${t}${g}${r.toString().padStart(2,'0')}`; cls.add(new Option(v,v)); 
            }}});
            const seat = document.getElementById('f-seat');
            for(let i=1; i<=50; i++) seat.add(new Option(i+'號', i));
        }

        initClasses(); refresh();
        client.channel('any').on('postgres_changes', { event: '*', schema: 'public' }, () => refresh()).subscribe();
        setInterval(() => { if (document.getElementById('page-delivery').classList.contains('active')) renderDelivery(); }, 30000);
    </script>
</body>
</html>
