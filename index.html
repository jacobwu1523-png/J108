<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>校園預購 Pro - 旗艦管理版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: 'Noto Sans TC', sans-serif; background: #f8fafc; margin: 0; color: #1e293b; overflow-x: hidden; }

        .page { display: none; padding: 20px 16px 140px 16px; min-height: 100vh; }
        .page.active { display: block; animation: pageIn 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes pageIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .nav-bar {
            position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 450px; height: 72px;
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); border-radius: 28px;
            display: flex; align-items: center; justify-content: space-around;
            padding: 8px; z-index: 999; border: 1px solid rgba(255,255,255,0.1);
        }
        .nav-btn { flex: 1; height: 100%; display: flex; align-items: center; justify-content: center; color: #64748b; font-size: 14px; font-weight: 700; transition: 0.3s; }
        .nav-btn.active { color: #0f172a; background: #fff; border-radius: 20px; box-shadow: 0 4px 12px rgba(255,255,255,0.2); }

        #login-screen {
            position: fixed; inset: 0; background: #0f172a; z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #login-screen.hide { opacity: 0; pointer-events: none; transform: scale(1.1); }

        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.3); }
        
        #toast {
            position: fixed; top: 30px; left: 50%; transform: translateX(-50%);
            background: #0f172a; color: #fff; padding: 14px 28px;
            border-radius: 50px; font-weight: 900; z-index: 3000; opacity: 0; transition: 0.3s;
        }
        #toast.show { opacity: 1; top: 50px; }
    </style>
</head>
<body>

    <div id="toast">訊息</div>

    <div id="login-screen" class="p-8">
        <div class="w-full max-w-xs text-center">
            <div class="w-20 h-20 bg-blue-600 rounded-3xl mx-auto mb-8 flex items-center justify-center shadow-2xl shadow-blue-500/50">
                <span class="text-white text-4xl font-black">H.</span>
            </div>
            <h2 class="text-white text-2xl font-black mb-2 tracking-widest">系統鎖定</h2>
            <p class="text-slate-500 text-sm mb-8 font-bold">請輸入管理員金鑰</p>
            <input id="pwd-input" type="password" placeholder="••••••••" class="w-full bg-slate-800 border-0 rounded-2xl p-5 text-center text-white tracking-widest text-xl mb-4">
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-lg shadow-blue-600/30 active:scale-95 transition-transform">登入系統</button>
            <button onclick="hideLogin()" class="w-full text-slate-500 py-4 font-bold text-sm">返回商店</button>
        </div>
    </div>

    <section id="page-home" class="page active">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-4xl font-black tracking-tighter">HWHS.STORE</h1>
            <div class="w-10 h-10 bg-slate-200 rounded-full overflow-hidden border-2 border-white shadow-sm">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=student" alt="avatar">
            </div>
        </div>
        <div id="product-list" class="grid grid-cols-2 gap-4"></div>
    </section>

    <section id="page-admin" class="page">
        <div class="flex justify-between items-end mb-6">
            <h1 class="text-4xl font-black tracking-tighter">ADMIN.</h1>
            <button onclick="exportToCSV()" class="text-xs bg-slate-900 text-white px-4 py-2 rounded-xl font-bold">導出資料</button>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-8">
            <div class="bg-blue-600 p-5 rounded-[30px] text-white shadow-lg">
                <p class="text-[10px] font-bold opacity-70 uppercase tracking-widest">今日營收</p>
                <h3 id="total-revenue" class="text-2xl font-black">$0</h3>
            </div>
            <div class="bg-white p-5 rounded-[30px] border shadow-sm">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">總訂單數</p>
                <h3 id="total-orders" class="text-2xl font-black text-slate-800">0</h3>
            </div>
        </div>

        <div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-black text-slate-800">商品庫存</h2>
            <button onclick="openEditModal()" class="text-blue-600 text-xs font-black">+ 新增項目</button>
        </div>
        <div id="admin-product-list" class="space-y-3 mb-10"></div>

        <div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-black text-slate-800">訂單管理</h2>
            <button onclick="clearDoneOrders()" class="text-red-500 text-[10px] font-black">清除已完成</button>
        </div>
        <input type="text" id="order-search" oninput="renderAdminOrders()" placeholder="搜尋姓名、地點、商品..." class="w-full p-4 bg-white border border-slate-200 rounded-2xl mb-4 text-sm outline-none shadow-sm">
        
        <div class="flex gap-2 overflow-x-auto pb-4 no-scrollbar">
            <button onclick="setFilter('all')" class="filter-btn active" id="f-all">全部</button>
            <button onclick="setFilter('未付款')" class="filter-btn" id="f-unpaid">未付款</button>
            <button onclick="setFilter('未配送')" class="filter-btn" id="f-pending">未配送</button>
            <button onclick="setFilter('已完成')" class="filter-btn" id="f-done">已完成</button>
        </div>
        <div id="admin-order-list" class="space-y-3"></div>
    </section>

    <section id="page-delivery" class="page">
        <h1 class="text-4xl font-black mb-8 tracking-tighter">LOGISTICS.</h1>
        <div id="delivery-list" class="space-y-4"></div>
    </section>

    <nav class="nav-bar">
        <div onclick="go('home')" id="n-home" class="nav-btn active">商店</div>
        <div onclick="triggerLogin('admin')" id="n-admin" class="nav-btn">管理</div>
        <div onclick="triggerLogin('delivery')" id="n-delivery" class="nav-btn">配送</div>
    </nav>

    <div id="buy-modal" class="fixed inset-0 bg-black/70 hidden backdrop-blur-md z-[1500] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-[40px] p-8 shadow-2xl">
            <h2 id="m-buy-title" class="text-2xl font-black mb-6 text-slate-800"></h2>
            <div class="space-y-4">
                <input id="f-name" type="text" placeholder="你的真實姓名" class="w-full p-4 bg-slate-50 rounded-2xl border-0 focus:ring-2 ring-blue-500 transition-all">
                <input id="f-location" type="text" placeholder="配送地點 (例如: J103教室)" class="w-full p-4 bg-slate-50 rounded-2xl border-0 focus:ring-2 ring-blue-500 transition-all">
                <div class="flex gap-2">
                    <select id="f-class" class="flex-1 p-4 bg-slate-50 rounded-2xl border-0 font-bold"></select>
                    <select id="f-seat" class="w-24 p-4 bg-slate-50 rounded-2xl border-0 font-bold"></select>
                </div>
                <div class="bg-slate-900 p-5 rounded-[28px] text-white flex justify-between items-center">
                    <div>
                        <p class="text-[10px] font-bold opacity-40 uppercase">數量</p>
                        <input id="f-qty" type="number" value="1" min="1" oninput="recalcTotal()" class="w-16 bg-transparent font-black text-2xl outline-none">
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] font-bold opacity-40 uppercase">總計金額</p>
                        <p id="f-total-price" class="font-black text-3xl text-blue-400">$0</p>
                    </div>
                </div>
                <button id="btn-submit-order" class="w-full bg-blue-600 text-white py-5 rounded-[25px] font-black text-lg active:scale-95 transition-transform shadow-xl shadow-blue-600/20">確認預訂</button>
                <button onclick="closeModals()" class="w-full text-slate-300 font-bold py-2 text-sm uppercase tracking-widest">取消離開</button>
            </div>
        </div>
    </div>

    <div id="edit-modal" class="fixed inset-0 bg-black/70 hidden backdrop-blur-md z-[1500] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-[40px] p-8 shadow-2xl">
            <h2 class="text-2xl font-black mb-6">編輯商品項目</h2>
            <div class="space-y-4">
                <input id="e-id" type="hidden">
                <input id="e-name" type="text" placeholder="商品名稱" class="w-full p-4 bg-slate-50 rounded-2xl border-0">
                <div class="flex gap-2">
                    <input id="e-price" type="number" placeholder="價格" class="flex-1 p-4 bg-slate-50 rounded-2xl border-0 font-black">
                    <input id="e-stock" type="number" placeholder="庫存量" class="flex-1 p-4 bg-slate-50 rounded-2xl border-0 font-black">
                </div>
                <input id="e-img" type="text" placeholder="圖片直連 URL" class="w-full p-4 bg-slate-50 rounded-2xl border-0 text-xs">
                <button onclick="saveProduct()" class="w-full bg-slate-900 text-white py-5 rounded-[25px] font-black mt-4 shadow-lg shadow-slate-900/20">儲存變更</button>
                <button id="btn-del-product" onclick="deleteProduct()" class="w-full bg-red-50 text-red-500 py-3 rounded-2xl font-bold text-sm hidden">刪除此商品</button>
                <button onclick="closeModals()" class="w-full text-slate-300 font-bold py-2 text-sm">取消</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://qliyeeermhtzxismtfdc.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_8LJkxWG-tcL0PBPtDyreVw_HyqKSDNk';
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const ADMIN_PWD = '@hwhs';
        let isAdminLoggedIn = false;
        let products = [];
        let orders = [];
        let currentFilter = 'all';
        let pendingPage = 'home';

        function toast(msg) {
            const t = document.getElementById('toast'); t.innerText = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        // 管理員登入控制
        function triggerLogin(target) {
            if (isAdminLoggedIn) {
                go(target);
            } else {
                pendingPage = target;
                document.getElementById('login-screen').classList.remove('hide');
            }
        }

        function handleLogin() {
            const pwd = document.getElementById('pwd-input').value;
            if (pwd === ADMIN_PWD) {
                isAdminLoggedIn = true;
                document.getElementById('login-screen').classList.add('hide');
                toast("✅ 授權成功");
                go(pendingPage);
                document.getElementById('pwd-input').value = "";
            } else {
                toast("❌ 密碼錯誤");
            }
        }

        function hideLogin() {
            document.getElementById('login-screen').classList.add('hide');
            go('home');
        }

        async function refresh() {
            const { data: p } = await client.from('products').select('*').order('name');
            if(p) { products = p; renderStore(); renderAdminP(); }
            const { data: o } = await client.from('orders').select('*').order('created_at', {ascending: false});
            if(o) { orders = o; renderAdminOrders(); renderDelivery(); }
        }

        function renderStore() {
            document.getElementById('product-list').innerHTML = products.map(p => `
                <div class="glass-card p-3 rounded-[35px] shadow-sm relative border border-white">
                    <div class="relative w-full aspect-square bg-white flex items-center justify-center rounded-[28px] overflow-hidden">
                        <img src="${p.image_url}" class="max-w-full max-h-full object-contain">
                        ${p.stock <= 0 ? '<div class="absolute inset-0 bg-black/70 backdrop-blur-[4px] flex items-center justify-center text-white font-black tracking-tighter text-xl">已售完</div>' : ''}
                    </div>
                    <div class="p-3 text-center">
                        <p class="font-bold text-slate-800 truncate text-sm">${p.name}</p>
                        <p class="font-black text-blue-600 mt-1">$${p.price}</p>
                        <button onclick="openBuyModal('${p.id}')" ${p.stock <= 0 ? 'disabled' : ''} class="w-full mt-3 py-3 rounded-2xl font-black text-[10px] uppercase tracking-widest transition-all ${p.stock <= 0 ? 'bg-slate-100 text-slate-300':'bg-slate-900 text-white active:scale-95'} shadow-lg shadow-slate-200">
                            ${p.stock <= 0 ? '無庫存' : '立即預訂'}
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function renderAdminP() {
            document.getElementById('admin-product-list').innerHTML = products.map(p => `
                <div class="bg-white p-4 rounded-3xl border flex items-center gap-4 shadow-sm">
                    <img src="${p.image_url}" class="w-12 h-12 rounded-xl object-contain bg-slate-50">
                    <div class="flex-1">
                        <p class="font-black text-slate-800 text-sm">${p.name}</p>
                        <p class="text-[10px] font-bold ${p.stock <= 0 ? 'text-red-500':'text-slate-400'} uppercase">庫存: ${p.stock} | 價格: $${p.price}</p>
                    </div>
                    <button onclick="openEditModal('${p.id}')" class="bg-slate-50 px-4 py-2 rounded-xl text-[10px] font-black text-slate-400 hover:text-slate-900">編輯</button>
                </div>
            `).join('');
        }

        function renderAdminOrders() {
            document.getElementById('total-revenue').innerText = '$' + orders.reduce((s,x)=>s+x.total_price, 0);
            document.getElementById('total-orders').innerText = orders.length;
            const search = document.getElementById('order-search').value.toLowerCase();
            const filtered = orders.filter(x => {
                const match = x.customer_name.toLowerCase().includes(search) || (x.location||'').toLowerCase().includes(search) || x.product_name.toLowerCase().includes(search);
                if(!match) return false;
                if(currentFilter === 'all') return true;
                if(currentFilter === '未付款') return x.payment_status === '未付款';
                if(currentFilter === '未配送') return x.delivery_status === '未配送';
                if(currentFilter === '已完成') return x.delivery_status === '已完成';
                return true;
            });
            document.getElementById('admin-order-list').innerHTML = filtered.map(x => `
                <div class="bg-white p-5 rounded-3xl border relative shadow-sm">
                    <div class="flex justify-between items-start">
                        <div class="flex-1">
                            <p class="font-black text-slate-800">${x.customer_name} <span class="text-blue-500 text-xs">@${x.location||'未填'}</span></p>
                            <p class="text-[11px] text-slate-400 mt-1 font-bold">${x.product_name} x${x.quantity} (${x.class_name})</p>
                            <div class="flex gap-2 mt-2">
                                <span class="text-[9px] px-2 py-0.5 rounded-full font-bold ${x.payment_status==='已付款'?'bg-green-100 text-green-600':'bg-red-100 text-red-600'}">${x.payment_status}</span>
                                <span class="text-[9px] px-2 py-0.5 rounded-full font-bold ${x.delivery_status==='已完成'?'bg-blue-100 text-blue-600':'bg-slate-100 text-slate-600'}">${x.delivery_status}</span>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="font-black text-lg text-slate-900">$${x.total_price}</p>
                            <button onclick="deleteOrder('${x.id}')" class="text-[10px] font-black text-red-300 mt-3 hover:text-red-600 transition-colors underline">取消訂單</button>
                        </div>
                    </div>
                </div>`).join('');
        }

        function renderDelivery() {
            const now = new Date().getTime();
            const filtered = orders.filter(x => {
                if (x.delivery_status === '已完成' && x.completed_at) {
                    if (now - new Date(x.completed_at).getTime() > 120000) return false;
                }
                return true;
            });
            document.getElementById('delivery-list').innerHTML = filtered.map(x => `
                <div class="bg-white p-6 rounded-[40px] border shadow-sm ${x.delivery_status==='已完成'?'opacity-40 grayscale':''}">
                    <div class="flex justify-between mb-4">
                        <div>
                            <p class="text-xs font-black text-blue-600 uppercase tracking-widest mb-1">${x.location || '無地點'}</p>
                            <p class="text-2xl font-black text-slate-900">${x.class_name} - ${x.seat_number}號</p>
                            <p class="font-bold text-slate-400 mt-1">${x.customer_name} · ${x.product_name} x${x.quantity}</p>
                        </div>
                        <div class="bg-slate-100 px-4 py-2 rounded-2xl font-black text-slate-900">$${x.total_price}</div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <select onchange="updStatus('${x.id}','payment_status',this.value)" class="p-4 bg-slate-50 rounded-2xl text-xs font-black border-0">
                            <option ${x.payment_status==='未付款'?'selected':''}>未付款</option>
                            <option ${x.payment_status==='已付款'?'selected':''}>已付款</option>
                        </select>
                        <select onchange="updStatus('${x.id}','delivery_status',this.value)" class="p-4 bg-slate-900 text-white rounded-2xl text-xs font-black border-0">
                            <option ${x.delivery_status==='未配送'?'selected':''}>未配送</option>
                            <option ${x.delivery_status==='已完成'?'selected':''}>已完成</option>
                        </select>
                    </div>
                </div>`).join('');
        }

        window.updStatus = async (id, f, v) => {
            let data = { [f]: v };
            if (f === 'delivery_status' && v === '已完成') {
                data.completed_at = new Date().toISOString();
            } else if (f === 'delivery_status' && v === '未配送') {
                data.completed_at = null; // 確保不會被誤判為已完成而隱藏
            }
            await client.from('orders').update(data).eq('id', id);
            toast("📡 資料已同步");
            refresh();
        };

        window.clearDoneOrders = async () => {
            if(!confirm('這會永久刪除資料庫中所有「已完成」的訂單，確定嗎？')) return;
            await client.from('orders').delete().eq('delivery_status', '已完成');
            toast('🧹 已清空已完成訂單'); refresh();
        };

        // 核心功能... (其餘部分維持高效邏輯)
        window.setFilter = (f) => {
            currentFilter = f;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            const map = {'all':'f-all','未付款':'f-unpaid','未配送':'f-pending','已完成':'f-done'};
            document.getElementById(map[f]).classList.add('active');
            renderAdminOrders();
        };

        function go(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('page-'+id).classList.add('active');
            document.getElementById('n-'+id).classList.add('active');
            refresh();
        }

        window.openBuyModal = (id) => {
            const p = products.find(x => x.id === id);
            if(p.stock <= 0) return toast("完售商品無法預訂");
            currentP = p;
            document.getElementById('m-buy-title').innerText = p.name;
            document.getElementById('f-qty').value = 1; recalcTotal();
            document.getElementById('buy-modal').classList.remove('hidden');
        };

        document.getElementById('btn-submit-order').onclick = async () => {
            const name = document.getElementById('f-name').value;
            const loc = document.getElementById('f-location').value;
            const qty = parseInt(document.getElementById('f-qty').value);
            if(!name || !loc) return toast('⚠️ 姓名與地點必填');
            if(qty > currentP.stock) return toast('⚠️ 庫存不足');

            await client.from('products').update({ stock: currentP.stock - qty }).eq('id', currentP.id);
            await client.from('orders').insert([{
                customer_name: name, location: loc, class_name: document.getElementById('f-class').value,
                seat_number: document.getElementById('f-seat').value, product_name: currentP.name,
                quantity: qty, total_price: qty * currentP.price, payment_status: '未付款', delivery_status: '未配送'
            }]);
            toast('🎉 預訂成功'); closeModals(); refresh();
        };

        window.openEditModal = (id) => {
            const btnDel = document.getElementById('btn-del-product');
            if(id) {
                const p = products.find(x => x.id === id);
                document.getElementById('e-id').value = p.id;
                document.getElementById('e-name').value = p.name;
                document.getElementById('e-price').value = p.price;
                document.getElementById('e-stock').value = p.stock;
                document.getElementById('e-img').value = p.image_url;
                btnDel.classList.remove('hidden');
            } else {
                document.getElementById('e-id').value = '';
                document.getElementById('e-name').value = '';
                btnDel.classList.add('hidden');
            }
            document.getElementById('edit-modal').classList.remove('hidden');
        };

        window.saveProduct = async () => {
            const data = { name: document.getElementById('e-name').value, price: parseInt(document.getElementById('e-price').value), stock: parseInt(document.getElementById('e-stock').value), image_url: document.getElementById('e-img').value };
            const id = document.getElementById('e-id').value;
            if(id) await client.from('products').update(data).eq('id', id);
            else await client.from('products').insert([data]);
            closeModals(); refresh();
        };

        window.recalcTotal = () => { document.getElementById('f-total-price').innerText = '$' + (document.getElementById('f-qty').value * currentP.price); };
        window.closeModals = () => { document.querySelectorAll('.fixed').forEach(m => m.classList.add('hidden')); };
        window.deleteOrder = async (id) => { if(confirm('確定要取消這筆訂單？庫存不會自動補回。')) { await client.from('orders').delete().eq('id', id); refresh(); }};
        window.deleteProduct = async () => { if(confirm('刪除商品？')) { await client.from('products').delete().eq('id', document.getElementById('e-id').value); closeModals(); refresh(); }};

        function initClasses() {
            const cls = document.getElementById('f-class');
            ['J','H'].forEach(t => { for(let g=1; g<=3; g++) { for(let r=1; r<=30; r++) { 
                let v = `${t}${g}${r.toString().padStart(2,'0')}`; cls.add(new Option(v,v)); 
            }}});
            const seat = document.getElementById('f-seat');
            for(let i=1; i<=50; i++) seat.add(new Option(i+'號', i));
        }

        initClasses(); refresh();
        client.channel('any').on('postgres_changes', { event: '*', schema: 'public' }, () => refresh()).subscribe();
        setInterval(() => { if (document.getElementById('page-delivery').classList.contains('active')) renderDelivery(); }, 30000);
        
        // 監聽 Enter 鍵登入
        document.getElementById('pwd-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleLogin();
        });
    </script>
</body>
</html>
